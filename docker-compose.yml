services:
  mongodb:
    image: mongo
    container_name: pandoralabs-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_DATABASE: pandoralabs
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - pandoralabs-network
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  redis:
    image: redis
    container_name: pandoralabs-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - pandoralabs-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: pandoralabs-app
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: development
      PORT: 3001
      MONGODB_URI: mongodb://mongodb:27017/pandoralabs
      REDIS_HOST: redis
      REDIS_PORT: 6379
    env_file:
      - .env.docker
    volumes:
      # Hot reload: mount source code
      - ./src:/app/src:delegated
      - ./test:/app/test:delegated
      # Mount configuration files
      - ./nest-cli.json:/app/nest-cli.json:delegated
      - ./tsconfig.json:/app/tsconfig.json:delegated
      - ./tsconfig.build.json:/app/tsconfig.build.json:delegated
      # Prevent overwriting node_modules
      - /app/node_modules
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pandoralabs-network
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:3001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

networks:
  pandoralabs-network:
    driver: bridge
    name: pandoralabs-network

volumes:
  mongodb_data:
    driver: local
    name: pandoralabs-mongodb-data
  mongodb_config:
    driver: local
    name: pandoralabs-mongodb-config
  redis_data:
    driver: local
    name: pandoralabs-redis-data
