services:
  postgres:
    image: postgres:17-alpine
    container_name: pandorlabs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pandorlabs
    # Host port 5434: 5432/5433 are taken by other local projects.
    ports:
      - '${POSTGRES_PORT:-5434}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d pandorlabs']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
